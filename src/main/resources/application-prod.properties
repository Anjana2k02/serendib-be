# =============================================
# PROD profile — Railway hosted deployment
# Active on: master branch (server sets SPRING_PROFILES_ACTIVE=prod)
# =============================================

# Server - Railway injects PORT automatically
server.port=${PORT:8080}
server.address=0.0.0.0

# Railway PostgreSQL - injected into the backend service variables
spring.datasource.url=jdbc:postgresql://${PGHOST}:${PGPORT}/${PGDATABASE}
spring.datasource.username=${PGUSER}
spring.datasource.password=${PGPASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA - PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA - quiet in production
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

# Logging - minimal in production
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.com.serendib.museum=INFO

# JWT - set JWT_SECRET in Railway dashboard → Variables
jwt.secret=${JWT_SECRET:5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437}

