# =============================================
# DEV profile — local development only
# Active on: dev branch, feature branches
# Run: ./mvnw spring-boot:run  (no flags needed)
# =============================================

# Server
server.port=8080
server.address=0.0.0.0

# Local H2 Database (no setup required - in-memory)
spring.datasource.url=jdbc:h2:mem:museumdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA - H2 Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# JPA - verbose output for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - verbose for development
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.serendib.museum=DEBUG

# JWT - dev secret (never use in production)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Google OAuth2 - replace with your dev client ID
google.client-id=REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID
