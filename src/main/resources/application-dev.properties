# =============================================
# DEV profile — local development only
# Active on: dev branch, feature branches
# Run: ./mvnw spring-boot:run  (no flags needed)
# =============================================

# Server
server.port=8080
server.address=0.0.0.0

# Local PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/museumdb
spring.datasource.username=postgres
spring.datasource.password=root

# JPA - verbose output for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - verbose for development
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.serendib.museum=DEBUG

# JWT - dev secret (never use in production)
jwt.secret=5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437

# Google OAuth2 - replace with your dev client ID
google.client-id=REPLACE_WITH_YOUR_GOOGLE_CLIENT_ID
