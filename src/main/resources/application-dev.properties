# Local PostgreSQL Database
spring.datasource.url=${DEV_DATABASE_URL:jdbc:postgresql://localhost:5432/museumdb}
spring.datasource.username=${DEV_DATABASE_USERNAME:postgres}
spring.datasource.password=${DEV_DATABASE_PASSWORD:root}
spring.datasource.driver-class-name=org.postgresql.Driver

# Previous local H2 Database setup kept for reference
#spring.datasource.url=jdbc:h2:mem:museumdb
#spring.datasource.driver-class-name=org.h2.Driver
#spring.datasource.username=sa
#spring.datasource.password=
#spring.h2.console.enabled=true
#spring.h2.console.path=/h2-console

# JPA - PostgreSQL Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JPA - verbose output for debugging
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging - verbose for development
logging.level.org.springframework.web=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.com.serendib.museum=DEBUG

